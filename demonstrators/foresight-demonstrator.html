  d["perceived_utilisation"] = (perceived_util_in) - (perceived_util_out);
  return d;
}

// Core stepper. opts may carry { initialStocks, start, stop } so the forward
// run can be seeded from the calibration endpoint at t0. The integrator is
// byte-identical to the checkpoint path validated in Stage 5.
function stepAll(overrides, opts) {
  opts = opts || {};
  const P = Object.assign({}, BASE_PARAMS, overrides || {});
  const dt = SIM.dt;
  const start = (opts.start !== undefined) ? opts.start : SIM.start;
  const stop = (opts.stop !== undefined) ? opts.stop : SIM.stop;
  const method = (SIM.method || "rk4").toLowerCase();
  let S = opts.initialStocks ? Object.assign({}, opts.initialStocks) : initials(P);
  const mins = {}; STOCK_NAMES.forEach(s => mins[s] = S[s]);
  const times = [];
  const series = {}; REPORT_VARS.forEach(v => series[v] = []);
  const STOCKSET = new Set(STOCK_NAMES);
  function record(tt) {
    const a = auxValues(S, P, tt);
    times.push(tt);
    REPORT_VARS.forEach(v => series[v].push(STOCKSET.has(v) ? S[v] : a[v]));
  }
  let t = start;
  const nsteps = Math.round((stop - start) / dt);
  record(start);
  for (let i = 0; i < nsteps; i++) {
    if (method === "euler") {
      const k1 = deriv(S, P, t);
      const ns = {}; STOCK_NAMES.forEach(s => ns[s] = S[s] + dt * k1[s]); S = ns;
    } else {
      const k1 = deriv(S, P, t);
      const s2 = {}; STOCK_NAMES.forEach(s => s2[s] = S[s] + 0.5 * dt * k1[s]);
      const k2 = deriv(s2, P, t + 0.5 * dt);
      const s3 = {}; STOCK_NAMES.forEach(s => s3[s] = S[s] + 0.5 * dt * k2[s]);
      const k3 = deriv(s3, P, t + 0.5 * dt);
      const s4 = {}; STOCK_NAMES.forEach(s => s4[s] = S[s] + dt * k3[s]);
      const k4 = deriv(s4, P, t + dt);
      const ns = {};
      STOCK_NAMES.forEach(s => ns[s] = S[s] + dt / 6.0 * (k1[s] + 2*k2[s] + 2*k3[s] + k4[s]));
      S = ns;
    }
    t = start + (i + 1) * dt;
    STOCK_NAMES.forEach(s => { if (S[s] < mins[s]) mins[s] = S[s]; });
    record(t);
  }
  return { times: times, series: series, finalStocks: S, mins: mins };
}

// Full time series + endpoint stock vector — for the dashboard.
function simulate(overrides, opts) { return stepAll(overrides, opts); }
function final_state(overrides, opts) { return stepAll(overrides, opts).finalStocks; }

// Checkpoint matrix — the Stage 5 validation path (numerics unchanged).
function run(overrides, checkpoints, opts) {
  const out = stepAll(overrides, opts);
  const cpset = new Set(checkpoints.map(c => c.toFixed(6)));
  const captured = {};
  out.times.forEach((tt, i) => {
    if (cpset.has(tt.toFixed(6))) {
      const row = {};
      REPORT_VARS.forEach(v => row[v] = out.series[v][i]);
      captured[tt.toFixed(6)] = row;
    }
  });
  return { checkpoints: captured, stock_mins: out.mins };
}

  Array.prototype.forEach.call(el("console").querySelectorAll('input[type=range]'),function(inp){
    inp.oninput=function(){ var k=inp.getAttribute('data-k'), v=parseFloat(inp.value);
      state[state.active][k]=v;
      var sv=el("console").querySelector('.sval[data-k="'+k+'"]');
      if(sv) sv.textContent=v+(CUNIT[k]?' '+CUNIT[k]:'');
      stylePresetBtns(); renderTiles(); renderCharts(); }; });
  var rb=el("resetbtn");
  if(rb) rb.onclick=function(){ var t=state[state.active];
    for(var k in DASH.base) t[k]=DASH.base[k]; state.selectedPreset[state.active]=undefined; renderAll(); };
  stylePresetBtns();
}
function renderCharts(){
  var html="";
  CHARTMETA=[];
  function key(ch){ return ch.vars.map(function(v,vi){
      return '<span class="ki"><span class="ksw" style="background:'+VARCOL[vi%VARCOL.length]+'"></span>'+v+'</span>'; }).join(""); }
  if(state.mode==="forward"){
    var A=computeForward(state.A), B=computeForward(state.B), xs=xAxis(A);
    (DASH.charts||[]).forEach(function(ch,ci){
      var sers=[]; ch.vars.forEach(function(v,vi){ var c=VARCOL[vi%VARCOL.length];
        sers.push({ys:A.series[v],color:c,dashed:false,label:v+" - A"});
        sers.push({ys:B.series[v],color:c,dashed:true,label:v+" - B"}); });
      html+='<div class="card"><div class="ctitle">'+ch.title+'</div>'+chartSVG(xs,sers,ch.y_label,ch.invert_y,ci)+
            '<div class="legend">'+key(ch)+'<span class="ki" style="color:'+MUTE+'">solid = Scenario A &nbsp;\u00b7&nbsp; dashed = Scenario B</span></div></div>';
    });
  } else {
    var C=computeBackcast({}), xs=xAxis(C);
    (DASH.charts||[]).forEach(function(ch,ci){
      var sers=ch.vars.map(function(v,vi){ return {ys:C.series[v],color:VARCOL[vi%VARCOL.length],dashed:false,label:v}; });
      html+='<div class="card"><div class="ctitle">'+ch.title+'</div>'+chartSVG(xs,sers,ch.y_label,ch.invert_y,ci)+
            '<div class="legend">'+key(ch)+'<span class="ki" style="color:'+MUTE+'">Calibration backcast - reproduces history; dashed vertical line = calibration anchor</span></div></div>';
    });
  }
  el("charts").innerHTML=html;
  attachHover();
}
function attachHover(){
  var tip=el("chartTip");
  if(!tip){ tip=document.createElement("div"); tip.id="chartTip"; document.body.appendChild(tip); }
  Array.prototype.forEach.call(document.querySelectorAll("svg.chsvg"),function(svg){
    var ci=parseInt(svg.getAttribute("data-ci"),10), m=CHARTMETA[ci]; if(!m)return;
    var cx=svg.querySelector(".cx");
    svg.addEventListener("mousemove",function(evt){
      var r=svg.getBoundingClientRect(), px=(evt.clientX-r.left)*m.W/r.width;
      if(px<m.padL-2||px>m.W-m.padR+2){ cx.style.display="none"; tip.style.display="none"; return; }
      var xv=m.xmin+(px-m.padL)/(m.W-m.padL-m.padR)*(m.xmax-m.xmin);
      var bi=0,bd=Infinity; for(var i=0;i<m.xs.length;i++){ var d=Math.abs(m.xs[i]-xv); if(d<bd){bd=d;bi=i;} }
      var sx=m.padL+(m.xs[bi]-m.xmin)/(m.xmax-m.xmin)*(m.W-m.padL-m.padR);
      cx.setAttribute("x1",sx); cx.setAttribute("x2",sx); cx.style.display="";
      var dec=(m.ymax-m.ymin)<5?3:1;
      var h='<div class="tt">'+DASH.time_units+' '+fmt(m.xs[bi],(m.xmax-m.xmin)<5?2:1)+(state.mode==="forward"?" from today":"")+'</div>';
      m.sers.forEach(function(s){ h+='<div class="tr"><span class="sw" style="background:'+s.color+(s.dashed?';opacity:.55':'')+'"></span>'+(s.label||"")+'<span class="tvv">'+fmt(s.ys[bi],dec)+'</span></div>'; });
      tip.innerHTML=h; tip.style.display="block";
      var pad=14, tw=tip.offsetWidth||190, lx=evt.clientX+pad;
      if(lx+tw>window.innerWidth-8) lx=evt.clientX-tw-pad;
      tip.style.left=lx+"px"; tip.style.top=(evt.clientY+pad)+"px";
    });
    svg.addEventListener("mouseleave",function(){ cx.style.display="none"; tip.style.display="none"; });
  });
}
function renderNote(){
  el("note").innerHTML = state.mode==="forward"
    ? "Forward re-anchors to today by seeding the run from the calibration\u2019s endpoint state, then runs future policy. Edit the active scenario and compare A against B."
    : "Two views, one validated engine. Validation reproduces the subject\u2019s known history; switch to Forward to drive future policy.";
}
function renderAssume(){
  el("assume").innerHTML='<h2>What this model assumes - and what it doesn\u2019t</h2>'+
    (DASH.assumptions||[]).map(function(a){ return '<p><b>'+a.title+'</b> '+a.body+'</p>'; }).join("");
}
function renderAll(){ renderModebar(); renderNote(); renderTiles(); renderConsole(); renderCharts(); }
el("kicker").textContent=DASH.kicker; el("title").textContent=DASH.title; el("sub").textContent=DASH.subtitle;
el("foot").textContent=DASH.footer; renderAssume(); renderAll();
</script>
</body></html>
